version: '3.8'

services:
  # ─────────────────────────────────────────────
  # Spring Boot App
  # ─────────────────────────────────────────────
  spring-app:
    image: ghcr.io/${GITHUB_REPO}:latest
    container_name: spring-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MODEL_PATH=/app/models
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseContainerSupport
    volumes:
      # 2.8GB LLM model yahan mount hoga
      - ./models:/app/models:ro
      - ./logs:/app/logs
    depends_on:
      - ollama
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # Ollama (LLM Server)
  # Ye alag se LLM serve karta hai REST API pe
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # 2.8GB model yahan store hoga
      - ./models/ollama:/root/.ollama
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - app-network
    # GPU support (agar available ho)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy (Optional)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - spring-app
    networks:
      - app-network

volumes:
  ollama-data:

networks:
  app-network:
    driver: bridge
