name: CI/CD Pipeline with LLM Code Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: kuldeep3004/spring-llm-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Java/Spring)
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.get-jar.outputs.jar-name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false --batch-mode

      - name: Get JAR name
        id: get-jar
        run: |
          JAR=$(ls target/*.jar | grep -v original | head -1)
          echo "jar-name=$JAR" >> $GITHUB_OUTPUT

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-app-jar
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: LLM Code Review via Ollama (PR only)
  # ─────────────────────────────────────────────
  llm-code-review:
    name: LLM Code Review (Ollama)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get-diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.java' > pr_diff.txt
          echo "diff-size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT
          cat pr_diff.txt | head -500

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          echo "Ollama started"

      - name: Pull LLM Model (lightweight for CI)
        run: |
          # CI me lightweight model use karo (2.8GB model CI ke liye heavy hai)
          # Agar aapka self-hosted runner hai to model path change karo
          ollama pull llama3.2:3b
          echo "Model ready"

      - name: Run LLM Code Review
        id: llm-review
        run: |
          DIFF=$(cat pr_diff.txt | head -3000)
          
          REVIEW=$(ollama run llama3.2:3b "
          You are a senior Java/Spring Boot code reviewer.
          Review the following git diff and provide:
          1. BUGS: Any bugs or logical errors
          2. SECURITY: Security vulnerabilities
          3. PERFORMANCE: Performance issues  
          4. BEST_PRACTICES: Spring Boot / Java best practice violations
          5. SUGGESTIONS: Improvements
          
          Keep it concise. Use bullet points. Format in Markdown.
          
          Git Diff:
          $DIFF
          ")
          
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.llm-review.outputs.review }}`;
            const body = `## 🤖 LLM Code Review (Ollama - llama3.2)
            
            ${review}
            
            ---
            *Generated by Ollama LLM | [CI Pipeline](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Render (Primary)
  # ─────────────────────────────────────────────
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    outputs:
      deploy-status: ${{ steps.render-deploy.outputs.status }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        id: render-deploy
        run: |
          # Render ka Deploy Hook use karo
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          echo "HTTP Status: $RESPONSE"
          
          if [ "$RESPONSE" == "200" ] || [ "$RESPONSE" == "201" ] || [ "$RESPONSE" == "202" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Render deploy triggered successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Render deploy failed with status: $RESPONSE"
            exit 1
          fi

      - name: Wait & Verify Render Deploy
        if: steps.render-deploy.outputs.status == 'success'
        run: |
          echo "Waiting for Render to deploy..."
          sleep 60
          
          # Health check karo
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_APP_URL }}/actuator/health" || echo "000")
            
            if [ "$STATUS" == "200" ]; then
              echo "✅ App is healthy on Render!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 30s..."
            sleep 30
          done
          
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Railway (Fallback)
  # ─────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway (Fallback)
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-render]
    if: |
      always() &&
      needs.build-and-test.result == 'success' &&
      needs.deploy-render.result == 'failure' &&
      github.ref == 'refs/heads/main'
    environment: production
    outputs:
      deploy-status: ${{ steps.railway-deploy.outputs.status }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: railway-deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Verify Railway Deploy
        run: |
          sleep 60
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RAILWAY_APP_URL }}/actuator/health" || echo "000")
            
            if [ "$STATUS" == "200" ]; then
              echo "✅ App is healthy on Railway!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 30
          done
          exit 1

  # ─────────────────────────────────────────────
  # JOB 5: Manual Deploy via Docker (Last Resort)
  # ─────────────────────────────────────────────
  deploy-manual:
    name: Manual Deploy (Docker + VPS)
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-render, deploy-railway]
    if: |
      always() &&
      needs.build-and-test.result == 'success' &&
      needs.deploy-render.result == 'failure' &&
      needs.deploy-railway.result == 'failure' &&
      github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: spring-app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Login to registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Stop old container
            docker stop spring-app 2>/dev/null || true
            docker rm spring-app 2>/dev/null || true
            
            # Run new container
            # Note: LLM model 2.8GB ko VPS pe mount karo
            docker run -d \
              --name spring-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /opt/models:/app/models \
              -e MODEL_PATH=/app/models \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Health check
            sleep 15
            curl -f http://localhost:8080/actuator/health || exit 1
            echo "✅ Manual deploy successful!"

  # ─────────────────────────────────────────────
  # JOB 6: Notify Deploy Status
  # ─────────────────────────────────────────────
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy-render, deploy-railway, deploy-manual]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Render   | ${{ needs.deploy-render.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway  | ${{ needs.deploy-railway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manual   | ${{ needs.deploy-manual.result }} |" >> $GITHUB_STEP_SUMMARY
